name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Warm offchain store (derivations + dev shell)
        working-directory: offchain
        run: >-
          nix build --quiet
          .#checks.x86_64-linux.unit-tests
          .#packages.x86_64-linux.format
          .#packages.x86_64-linux.format-check
          .#packages.x86_64-linux.hlint
          .#devShells.x86_64-linux.default.inputDerivation

  onchain:
    name: Onchain (Aiken)
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - name: Format check
        working-directory: onchain
        run: nix shell nixpkgs#aiken --command aiken fmt --check
      - name: Check (tests + type-check)
        working-directory: onchain
        run: nix shell nixpkgs#aiken --command aiken check

  blake3-spike:
    name: BLAKE3 spike (Aiken 1.1.23)
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - name: Verify pinned compiler
        working-directory: spikes/88-blake3-plutus
        run: nix flake check --no-eval-cache
      - name: Format check
        working-directory: spikes/88-blake3-plutus
        run: nix develop --quiet -c aiken fmt --check
      - name: Check (tests + type-check)
        working-directory: spikes/88-blake3-plutus
        run: nix develop --quiet -c aiken check

  offchain:
    name: Offchain (Haskell)
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run unit tests
        working-directory: offchain
        run: nix run --quiet .#unit-tests
      - name: Check formatting
        working-directory: offchain
        run: nix run --quiet .#format-check
      - name: Lint
        working-directory: offchain
        run: nix run --quiet .#hlint

  devshell:
    name: Dev shell
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Prove `nix develop` yields a working toolchain AND that the full project
      # compiles from the dev shell CHaP-offline — without fetching the secure
      # https CHaP index a fresh CHaP-empty runner cannot reach (issue #99 S9c).
      # (hackage over http + the git SRPs stay live, as on the passing runner;
      # only the secure https CHaP index was the failure.) The dev shell injects a
      # Nix-LOCAL CHaP repository (from the CHaP flake input); `cabal update`
      # generates its index cache offline + refreshes hackage (plain http), then
      # the build compiles the CHaP stack + local project from local source.
      # --enable-tests covers the offchain/e2e test component + the
      # cardano-node-clients `devnet` sublibrary (a real full build, not reduced).
      - name: Dev-shell cabal build
        working-directory: offchain
        run: nix develop --quiet -c bash -c 'cabal update --project-file=cabal.project.devshell && cabal build all --enable-tests -O0 --project-file=cabal.project.devshell'

  e2e:
    name: E2E (withDevnet)
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Live-boundary #99 cage Phase-2 smoke: the runCommand check starts a real
      # cardano-node via withDevnet, mints/requests/modifies against the hardened
      # validator and observes the Modify settle. Linux-only.
      - name: withDevnet cage Phase-2 smoke
        working-directory: offchain
        run: nix build --quiet -L .#checks.x86_64-linux.e2e

  e2e-sweep:
    name: E2E batch sweep (withDevnet)
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      # Fast guard: the committed sweep-boundary.md must be internally
      # consistent (declared-aggregate arithmetic + cage script hash present),
      # so a hand-edit of the artifact is caught without a devnet.
      - name: Verify committed sweep artifact
        working-directory: offchain
        run: nix build --quiet -L .#checks.x86_64-linux.sweep-consistency
      # Heavy reproducible verification: regenerate the artifact by submitting
      # one Modify per batch size through withDevnet, ASSERTING each expected
      # node outcome (N=1..4 settle; N>=5 reject at the specific Phase-1 limit).
      # A boundary/harness regression fails the run. Not in the routine gate.
      - name: Regenerate + assert #99 Modify batch sweep
        working-directory: offchain
        run: nix run --quiet .#e2e-sweep
