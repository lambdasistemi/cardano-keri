site_name: cardano-aid
site_description: Self-certifying identities on Cardano with pre-rotation
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - KERI Primer: keri-primer.md
  - Finance Primer: finance-primer.md
  - Architecture:
      - Overview: architecture/overview.md
      - Identity Operations: architecture/identity-ops.md
      - Value Authorization: architecture/value-auth.md
      - Veridian Bridge: architecture/veridian-bridge.md
      - Amaru Integration Analysis: architecture/amaru-integration.md
  - Design:
      - AID Model: design/aid-model.md
      - Trust Model: design/trust-model.md
      - Operational: design/operational.md
      - User Experience: design/user-experience.md
      - Blake2b-256 Requirement: design/blake2b256-requirement.md
      - Super Watcher: design/super-watcher.md
      - vLEI Bridge: design/vlei.md
      - Regulated DeFi Gate: design/defi-gate.md
  - Business Cases:
      - Comparison & Factored Core: design/business-cases/index.md
      - Regulated DeFi: design/business-cases/regulated-defi.md
      - Identified SPO Delegation: design/business-cases/spo-delegation.md
      - KYC Security Tokens: design/business-cases/security-tokens.md
      - Institutional Contracts: design/business-cases/institutional-contracts.md
  - Vetting: vetting/index.md
